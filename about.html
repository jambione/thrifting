  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    body { background: #F8EEE0; color: #2E1A0E; font-family: 'DM Sans', system-ui, sans-serif; line-height: 1.7; -webkit-font-smoothing: antialiased; }\n    a { color: inherit; text-decoration: none; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- NAV -->\n<header style=\"position: sticky; top: 0; z-index: 100; background: #F8EEE0; border-bottom: 1px solid #DFCBAA;\">\n  <nav style=\"max-width: 1280px; margin: 0 auto; padding: 0 48px; height: 66px; display: flex; align-items: center; justify-content: space-between;\">\n    <a href=\"index.html\" style=\"font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; letter-spacing: 0.3px;\">\n      thrifting <em style=\"color: #B87C4C; font-style: italic;\">over fifty<\u002Fem>\n    <\u002Fa>\n    <div style=\"display: flex; gap: 36px; font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #7D5C38;\">\n      <a href=\"index.html\">Home<\u002Fa>\n      <a href=\"blog.html\">Blog<\u002Fa>\n      <a href=\"about.html\" style=\"color: #B87C4C; border-bottom: 1px solid #B87C4C; padding-bottom: 2px;\">About<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n<\u002Fheader>\n\n<!-- MAIN -->\n<section style=\"max-width: 1280px; margin: 0 auto; padding: 80px 48px 120px; display: flex; gap: 80px; align-items: flex-start;\">\n\n  <!-- Left: text -->\n  <div style=\"flex: 55;\">\n    <p style=\"font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: #B87C4C; margin-bottom: 20px;\">About me<\u002Fp>\n    <h1 style=\"font-family: 'Playfair Display', serif; font-size: clamp(44px, 5vw, 72px); font-weight: 700; line-height: 1.05; color: #2E1A0E; margin-bottom: 48px;\">Kara<br><em style=\"color: #B87C4C; font-style: italic;\">Brasfield<\u002Fem><\u002Fh1>\n\n    <div style=\"display: flex; flex-direction: column; gap: 24px;\">\n      <p style=\"font-size: 18px; line-height: 1.85; color: #3A2010;\">I've always been interested in fashion in some way or another. When I was 10, I started creating my own fashions in paper doll format. I drew paper dolls, then made clothes for them and stuck the outfits onto my dolls with scotch tape. My aunt taught me to sew clothes for my dolls when I was 11. Then when I was 14, I did a \"gifted and talented program\" internship at the Barnes Museum in Southington, CT, learning about 19th century fashion and eventually designing my own 19th century-inspired dresses.<\u002Fp>\n      <p style=\"font-size: 18px; line-height: 1.85; color: #3A2010;\">I started gaining weight rapidly when I left college and was eventually diagnosed with metabolic disorder. I tried for years to lose weight. It wasn't until recently with the advances in medical science that I was able to overcome the massive challenge of losing weight.<\u002Fp>\n      <p style=\"font-size: 18px; line-height: 1.85; color: #3A2010;\">I went from my highest weight of 290 pounds in 2010 to my lowest weight of 210 pounds in 2019, but was never able to lose more than that without starving myself. Eating only 500 calories a day was not sustainable over the long term.<\u002Fp>\n      <p style=\"font-size: 18px; line-height: 1.85; color: #3A2010;\">When I got down to 175 in 2025, I realized I didn't know how to dress for my weight OR my age. I started thrifting as a way to not just keep my closet fresh and in my current size, but also as a way to experiment with fashion.<\u002Fp>\n      <p style=\"font-size: 18px; line-height: 1.85; color: #3A2010;\">What I learned opened up my eyes! I started having more fun than ever before with colors, patterns, brands, and various styles. I realized I have the most fun when I'm putting together something to wear. So why not write a blog about it?<\u002Fp>\n      <p style=\"font-size: 18px; line-height: 1.85; color: #3A2010;\">This is my attempt to document the cool things I've found in local consignment shops as well as online consignments such as ThredUp, Facebook Marketplace, and Poshmark.<\u002Fp>\n      <p style=\"font-family: 'Playfair Display', serif; font-style: italic; font-size: 20px; line-height: 1.7; color: #6B4A2C;\">I hope you enjoy reading about my journey!<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 48px; padding-top: 40px; border-top: 1px solid #DFCBAA;\">\n      <a href=\"blog.html\" style=\"display: inline-flex; align-items: center; gap: 10px; background: #B87C4C; color: #F8EEE0; padding: 15px 36px; font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;\">Read the Blog →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Right: image -->\n  <div style=\"flex: 45; position: sticky; top: 90px; align-self: center;\">\n    <img src=\"01c951b4-3a0c-4ec7-a619-e6139da8f3db\" alt=\"Kara\" style=\"width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block;\">\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"background: #2E1A0E; padding: 56px 48px; text-align: center;\">\n  <p style=\"font-family: 'Playfair Display', serif; font-size: 24px; color: #E8D0A8; margin-bottom: 10px;\">thrifting <em style=\"color: #C4895A; font-style: italic;\">over fifty<\u002Fem><\u002Fp>\n  <p style=\"font-size: 13px; color: #7D5C38; margin-bottom: 20px; letter-spacing: 0.05em;\">Thrifting isn't just for twenty-somethings.<\u002Fp>\n  <p style=\"font-size: 12px; color: #5C3D24;\">© 2026 Kara · <a href=\"index.html\" style=\"color: #B87C4C;\">Home<\u002Fa><\u002Fp>\n<\u002Ffooter>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
